name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  headless-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/bootstrap.py --mode cloud
      - run: python3 scripts/doctor.py
      - run: python3 scripts/test_headless.py
